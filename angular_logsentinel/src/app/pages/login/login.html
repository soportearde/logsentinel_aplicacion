<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L4 6v6c0 5.25 3.4 10.15 8 11.32C16.6 22.15 20 17.25 20 12V6l-8-4z" fill="#7c3aed"/>
        <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>LogSentinel</span>
    </div>

    <h1>Iniciar sesión</h1>
    <p class="subtitle">Accede a tu panel de monitorización</p>

    @if (error()) {
      <div class="alert-banner alert-error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()" #form="ngForm">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          placeholder="admin@logsentinel.com"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary submit-btn" [disabled]="loading">
        @switch (phase()) {
          @case ('login')      { Iniciando sesión... }
          @case ('dashboard')   { Cargando dashboard... }
          @case ('alerts')      { Cargando alertas... }
          @case ('complete')    { ¡Listo! }
          @default             { Iniciar sesión }
        }
      </button>
    </form>

    <div class="login-back">
      <a routerLink="/">← Volver al inicio</a>
    </div>
  </div>
</div>
